# ruehanix CI — PR / push to main 시 4 센서 자동 실행.
# smoke(playwright) 는 별도 잡으로 분리 가능. 여기선 빠르고 결정적인 센서만 다룬다.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 동일 PR/푸시에서 중복 실행 방지 — 가장 최근 것만 의미 있게.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # least-privilege: 기본 GITHUB_TOKEN 의 광범위 권한을 read-only 로 좁힘.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node (.nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
