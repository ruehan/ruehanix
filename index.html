// CSS text -> React style object. Template strings ("a:b;c:d") become inline styles.
// 제약: 값 안에 세미콜론(content:'a;b')이나 콜론(data: URI) 이 들어가는 선언은 지원하지 않는다.
// 그런 값이 필요하면 S()에 넘기지 말고 JSX style 객체로 직접 작성할 것.
function S(css){
  const o = {};
  if (!css) return o;
  for (const decl of css.split(';')) {
    const i = decl.indexOf(':');
    if (i < 0) continue;
    const key = decl.slice(0, i).trim();
    const val = decl.slice(i + 1).trim();
    if (!key) continue;
    // CSS 커스텀 프로퍼티(--x)는 React가 원형 그대로 받는다 — 카멜케이스 변환 금지.
    if (key.startsWith('--')) { o[key] = val; continue; }
    // 벤더 프리픽스: -webkit-/-moz-/-o- 는 대문자(Webkit…), -ms- 만 소문자(ms…)를 요구한다.
    let prop = key.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
    if (prop.startsWith('Ms')) prop = 'ms' + prop.slice(2);
    o[prop] = val;
  }
  return o;
}

  componentDidMount(){
    window.addEventListener('mousemove', this._mm);
    window.addEventListener('mouseup', this._mu);
    window.addEventListener('keydown', this._kd);
    window.addEventListener('resize', this._rz = ()=> this.setState({ W: window.innerWidth, H: window.innerHeight }));
    // auto 모드일 때 OS 다크/라이트 전환을 즉시 반영한다.
    if (window.matchMedia) {
      this._mq = window.matchMedia('(prefers-color-scheme: light)');
      this._mqh = ()=> { if (this.state.ui.mode === 'auto') this.applyTheme(); };
      this._mq.addEventListener('change', this._mqh);
    }
    this.runBoot();
    this.applyTheme();
    this._t = setInterval(()=> this.setState({ clock: this.fmtClock(), cpu: 8+Math.floor(Math.random()*26), ram: 44+Math.floor(Math.random()*12) }), 1400);
  }
  componentWillUnmount(){
    window.removeEventListener('mousemove', this._mm);
    window.removeEventListener('mouseup', this._mu);
    window.removeEventListener('keydown', this._kd);
    window.removeEventListener('resize', this._rz);
    if (this._mq && this._mqh) this._mq.removeEventListener('change', this._mqh);
    clearInterval(this._t); clearInterval(this._bt);
  }
  fmtClock(){ const d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
  runBoot(){
    clearInterval(this._bt); clearTimeout(this._bootDone);
    this.setState({ booting:true, bootN:0 });
    let n=0;
    this._bt = setInterval(()=>{
      n++;
      this.setState({ bootN:Math.min(n,this.bootSeq.length) });
      if(n>=this.bootSeq.length){
        clearInterval(this._bt);
        this._bootDone=setTimeout(()=>this.setState({ booting:false }), 700);
      }
    }, 200);
  }
  reboot(){ this.runBoot(); }

  onKey(e){
    if(this.state.booting) return;
    const k=e.key;
    if(e.metaKey || e.altKey){
      if(k==='d'||k==='D'){ e.preventDefault(); this.toggleLauncher(); }
      if(k==='/'){ e.preventDefault(); this.toggleKeys(); }
      if(k>='1'&&k<='6'){ e.preventDefault(); this.gotoWs(+k); }
      if(k==='q'||k==='Q'){ if(this.state.focused) this.close(this.state.focused); }
    }
    if(k==='Escape') this.setState({ showLauncher:false, showKeys:false });
  }

  curIds(){ return this.state.order.filter(k=> this.state.open[k] && this.state.open[k].ws===this.state.ws); }
  toggleLauncher(){ this.setState(s=>({ showLauncher: !s.showLauncher, showKeys:false })); }
  toggleKeys(){ this.setState(s=>({ showKeys: !s.showKeys, showLauncher:false })); }
  gotoWs(n){ this.setState(s=>{ const ids=s.order.filter(k=> s.open[k] && s.open[k].ws===n); return { ws:n, focused: ids[0]||null, showLauncher:false }; }); }
  openApp(k){
    this.setState(s=>{
      const open={...s.open};
      let order=s.order;
      if(open[k]){ open[k]={ws:s.ws}; }
      else { open[k]={ws:s.ws}; if(!order.includes(k)) order=[...order,k]; }
      return { open, order, focused:k, showLauncher:false };
    });
  }
  close(k){ this.setState(s=>{ const open={...s.open}; delete open[k]; const ids=s.order.filter(x=> open[x] && open[x].ws===s.ws); return { open, focused: s.focused===k ? (ids[ids.length-1]||null) : s.focused }; }); }
  focusApp(k){ this.setState({ focused:k }); }
  openPost(id){ this.setState(s=>{ const open={...s.open, reader:{ws:s.ws}}; const order=s.order.includes('reader')?s.order:[...s.order,'reader']; return { open, order, selected:id, focused:'reader' }; }); }
  setReaderSel(id){ this.setState({ selected:id }); }
  setFinderCat(c){ this.setState({ finderCat:c }); }
  effMode(){ const m=this.state.ui.mode; if(m==='auto'){ return (window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark'; } return m; }
  accentEff(){ const lat={'#f38ba8':'#d20f39','#fab387':'#fe640b','#a6e3a1':'#40a02b','#cba6f7':'#8839ef','#89b4fa':'#1e66f5','#f5c2e7':'#ea76cb'}; const a=this.state.ui.accent; return this.effMode()==='light' ? (lat[a]||a) : a; }
  applyTheme(){ const light=this.effMode()==='light'; document.documentElement.classList.toggle('rh-light', light); document.documentElement.style.setProperty('--accent', this.accentEff()); }
  setMode(m){ this.setState(s=>({ ui:{...s.ui, mode:m} }), ()=>this.applyTheme()); }
  setAccent(c){ this.setState(s=>({ ui:{...s.ui, accent:c} }), ()=>this.applyTheme()); }
  toggleUi(k){ this.setState(s=>({ ui:{...s.ui, [k]:!s.ui[k]} })); }
  startSlider(e){ e.preventDefault(); const rect=e.currentTarget.getBoundingClientRect(); this.drag={ type:'slider', left:rect.left, width:rect.width }; this.moveSlider(e); }
  moveSlider(e){ const d=this.drag; if(!d||d.type!=='slider') return; let pct=(e.clientX-d.left)/d.width; pct=Math.max(0,Math.min(1,pct)); this.setState(s=>({ ui:{...s.ui, gap:Math.round(pct*28)} })); }

  area(){ const g=this.state.ui.gap; const m=Math.max(6,g+2), top=8+34+8; return { x:m, y:top, w:this.state.W-m*2, h:this.state.H-top-m }; }
  layout(){
    const ids=this.curIds(); const rects={}; const gutters=[]; const gap=Math.max(2,this.state.ui.gap);
    if(ids.length===0) return { rects, gutters };
    let R={...this.area()}; let dir='v';
    for(let i=0;i<ids.length;i++){
      if(i===ids.length-1){ rects[ids[i]]={...R}; break; }
      const key=this.state.ws+':'+i; const ratio=this.state.ratios[key] ?? 0.5;
      if(dir==='v'){ const wA=Math.round(R.w*ratio);
        rects[ids[i]]={x:R.x,y:R.y,w:wA-gap/2,h:R.h};
        gutters.push({key, dir, total:R.w, x:R.x+wA-gap/2, y:R.y, w:gap, h:R.h});
        R={x:R.x+wA+gap/2,y:R.y,w:R.w-wA-gap/2,h:R.h};
      } else { const hA=Math.round(R.h*ratio);
        rects[ids[i]]={x:R.x,y:R.y,w:R.w,h:hA-gap/2};
        gutters.push({key, dir, total:R.h, x:R.x, y:R.y+hA-gap/2, w:R.w, h:gap});
        R={x:R.x,y:R.y+hA+gap/2,w:R.w,h:R.h-hA-gap/2};
      }
      dir = dir==='v'?'h':'v';
    }
    return { rects, gutters };
  }
  startGutter(g, e){ e.preventDefault(); this.drag={ key:g.key, dir:g.dir, total:g.total, sx:e.clientX, sy:e.clientY, start:(this.state.ratios[g.key] ?? 0.5) }; }
  onMove(e){ if(!this.drag) return; if(this.drag.type==='slider'){ this.moveSlider(e); return; } const d=this.drag; const delta = d.dir==='v' ? (e.clientX-d.sx) : (e.clientY-d.sy); let r = d.start + delta/d.total; r=Math.max(0.18,Math.min(0.82,r)); this.setState(s=>({ ratios:{...s.ratios,[d.key]:r} })); }
  onUp(){ this.drag=null; }

  lineIcon(k, size){
    const s=size||22; const sw=1.7;
    const com={width:s,height:s,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:sw,strokeLinecap:'round',strokeLinejoin:'round'};
    const E=React.createElement;
    const paths={
      files:[E('path',{key:1,d:'M3 7h6l2 2h10v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V7z'})],
      reader:[E('path',{key:1,d:'M4 5a2 2 0 0 1 2-2h6v18H6a2 2 0 0 0-2 2V5z'}),E('path',{key:2,d:'M12 3h6a2 2 0 0 1 2 2v16a2 2 0 0 0-2-2h-6'})],
      foto:[E('rect',{key:1,x:3,y:4,width:18,height:16,rx:2}),E('circle',{key:2,cx:8.5,cy:9.5,r:1.5}),E('path',{key:3,d:'M4 18l5-5 4 4 3-3 4 4'})],
      hotlap:[E('circle',{key:1,cx:12,cy:12,r:9}),E('circle',{key:2,cx:12,cy:12,r:2.2}),E('path',{key:3,d:'M12 3v5M3.8 9.5l4.8 2.2M20.2 9.5l-4.8 2.2'})],
      terminal:[E('rect',{key:1,x:3,y:4,width:18,height:16,rx:2}),E('path',{key:2,d:'M7 9l3 3-3 3M12.5 15h4'})],
      web:[E('circle',{key:1,cx:12,cy:12,r:9}),E('path',{key:2,d:'M3 12h18M12 3c2.5 2.5 2.5 15 0 18M12 3c-2.5 2.5-2.5 15 0 18'})],
      settings:[E('circle',{key:1,cx:12,cy:12,r:3}),E('path',{key:2,d:'M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2'})],
      about:[E('circle',{key:1,cx:12,cy:12,r:9}),E('path',{key:2,d:'M12 11v5'}),E('circle',{key:3,cx:12,cy:7.8,r:0.7,fill:'currentColor'})],
    };
    return E('svg',com,paths[k]);
  }

  renderVals(){
    const C={base:'var(--base)',mantle:'var(--mantle)',surf0:'var(--surf0)',surf1:'var(--surf1)',ov0:'var(--ov0)',text:'var(--text)',mauve:'#cba6f7'};
    const ui=this.state.ui;
    const accent=this.accentEff();
    const hexA=(hex,a)=>{ const h=hex.replace('#',''); const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16); return `rgba(${r},${g},${b},${a})`; };
    const rad = ui.rounded ? 11 : 2;
    const lay=this.layout();
    const tiles={};
    for(const k of this.keys){
      const r=lay.rects[k];
      const vis = this.state.open[k] && this.state.open[k].ws===this.state.ws && !this.state.booting && r;
      if(!vis){ tiles[k]='position:absolute;display:none;'; continue; }
      const foc=this.state.focused===k;
      const shadow = foc
        ? (ui.glow ? `0 0 0 1px ${hexA(accent,.45)},0 0 22px ${hexA(accent,.35)},0 14px 40px rgba(0,0,0,.5)` : '0 14px 40px rgba(0,0,0,.5)')
        : '0 8px 24px rgba(0,0,0,.35)';
      const op = ui.transp ? (foc ? 0.97 : 0.82) : 1;
      tiles[k]=`position:absolute;left:${r.x}px;top:${r.y}px;width:${r.w}px;height:${r.h}px;`
        +`border-radius:${rad}px;overflow:hidden;border:2px solid ${foc?accent:C.surf0};opacity:${op};`
        +(ui.transp?`backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);`:'')
        +`box-shadow:${shadow};`
        +`transition:left .17s ease,top .17s ease,width .17s ease,height .17s ease,border-color .15s,opacity .15s,box-shadow .15s;z-index:${foc?120:110};`;
    }
    const gutters=lay.gutters.map(g=>({ onDown:(e)=>this.startGutter(g,e),
      style:`position:absolute;left:${g.x}px;top:${g.y}px;width:${g.w}px;height:${g.h}px;z-index:300;cursor:${g.dir==='v'?'col-resize':'row-resize'};` }));

    const focus={}, close={};
    for(const k of this.keys){ focus[k]=()=>this.focusApp(k); close[k]=(e)=>{ e&&e.stopPropagation(); this.close(k); }; }

    const wsList=[1,2,3,4,5,6].map(n=>{
      const occupied=this.state.order.some(k=> this.state.open[k] && this.state.open[k].ws===n);
      const active=this.state.ws===n;
      const col = active ? 'var(--on-accent)' : (occupied ? accent : 'var(--ov0)');
      const bg = active ? `background:${accent};font-weight:700;` : (occupied?`background:${hexA(accent,.16)};`:'');
      return { n, onClick:()=>this.gotoWs(n),
        style:`min-width:22px;height:22px;display:flex;align-items:center;justify-content:center;padding:0 6px;border-radius:6px;font-size:12px;cursor:pointer;color:${col};${bg}` };
    });

    const fa=this.state.focused; const fm=fa?this.appMeta[fa]:null;
    const focusTitle = fm ? fm.name : 'ruehanix · Hyprland';
    const focusDot = fm ? fm.color : 'var(--ov0)';

    const appList=this.keys.map(k=>({ name:this.appMeta[k].name, color:this.appMeta[k].color, hint:this.appMeta[k].hint,
      icon:this.lineIcon(k,20), onClick:()=>this.openApp(k) }));

    const E=React.createElement;
    const kb=(combo,desc)=> E('div',{style:{display:'flex',alignItems:'center',gap:'10px',fontSize:'12.5px'}},
      E('span',{style:{color:'var(--text)',background:'var(--surf0)',borderRadius:'6px',padding:'3px 8px',fontWeight:600,whiteSpace:'nowrap'}},combo),
      E('span',{style:{color:'var(--sub0)'}},desc));
    const keybinds=[ kb('Super + D','앱 실행기'), kb('Super + 1-6','워크스페이스 이동'), kb('Super + Q','창 닫기'),
      kb('Super + /','이 도움말'), kb('Esc','오버레이 닫기'), kb('드래그','타일 경계 크기조절'),
      kb('워크스페이스 클릭','바에서 전환'), kb('앱 클릭','포커스 이동') ];
    const kbWrap = E(React.Fragment,null,...keybinds.map((el,i)=>E(React.Fragment,{key:i},el)));

    const bootLines=this.bootSeq.slice(0,this.state.bootN).map((l,i)=>{
      const tag = l[0]==='ok' ? E('span',{style:{color:'#a6e3a1'}},'  OK  ') : E('span',{style:{color:'#89b4fa'}},' INFO ');
      return { node: E('span',null, E('span',{style:{color:'var(--ov0)'}},'[ '), tag, E('span',{style:{color:'var(--ov0)'}},' ] '),
        E('span',{style:{color:'var(--sub0)'}},l[1]), E('span',{style:{color:'var(--text)',fontWeight:600}},l[2])) };
    });

    // ---- blog data ----
    const lightMode = this.effMode()==='light';
    const catC = lightMode ? {dev:'#1e66f5',sim:'#d20f39',moto:'#fe640b',music:'#8839ef'} : {dev:'#89b4fa',sim:'#f38ba8',moto:'#fab387',music:'#cba6f7'};
    const catOf=(id)=>({ label:this.cats[id].label, color: catC[id]||this.cats[id].color });
    const decorate=(p)=>{ const c=catOf(p.cat); return {
      id:p.id, title:p.title, date:p.date, read:p.read, excerpt:p.excerpt,
      catLabel:c.label, catColor:c.color,
      rowBg: p.id===this.state.selected ? hexA(accent,.14) : 'transparent',
      open:()=>this.openPost(p.id) }; };
    const fc=this.state.finderCat;
    const finderPosts=this.posts.filter(p=> fc==='all'||p.cat===fc).map(decorate);
    const finderCount=finderPosts.length+' items · '+this.posts.length+' total';
    const catList=[{key:'all',label:'all'}].concat(Object.keys(this.cats).map(k=>({key:k,label:this.cats[k].label})));
    const finderCats=catList.map(c=>({ key:c.key, label:c.label, onClick:()=>this.setFinderCat(c.key),
      chipStyle:`padding:3px 11px;border-radius:7px;font-size:12px;cursor:pointer;white-space:nowrap;${c.key===fc?`background:${accent};color:var(--on-accent);font-weight:700;`:'background:var(--surf0);color:var(--sub0);'}` }));
    const selP=this.posts.find(p=>p.id===this.state.selected)||this.posts[0];
    const selC=catOf(selP.cat);
    const post={ title:selP.title, date:selP.date, read:selP.read, catLabel:selC.label, catColor:selC.color,
      paras:selP.body.map((t,i)=>({ id:i, text:t })) };
    const readerList=this.posts.map(p=>{ const c=catOf(p.cat); return {
      id:p.id, title:p.title, catColor:c.color, date:p.date,
      itemStyle:`display:flex;flex-direction:column;gap:3px;padding:8px 10px;border-radius:7px;cursor:pointer;${p.id===this.state.selected?`background:${hexA(accent,.14)};`:''}`,
      open:()=>this.setReaderSel(p.id) }; });
    const photos=this.photos.map((ph,i)=>({ id:i, title:ph.t, tag:ph.tag,
      tileStyle:`position:relative;aspect-ratio:4/3;border-radius:9px;overflow:hidden;cursor:pointer;background:linear-gradient(135deg,${ph.c1},${ph.c2});border:1px solid var(--surf0);` }));
    const laps=this.laps.map((l,i)=>({ id:i, track:l.track, car:l.car, time:l.time, delta:l.delta, best:l.best,
      deltaColor: l.delta.startsWith('-')?'#a6e3a1':'#f38ba8',
      rowStyle:`display:grid;grid-template-columns:1.6fr 1.1fr .6fr .5fr;gap:10px;align-items:center;padding:11px 14px;border-bottom:1px solid var(--surf0);${l.best?'background:rgba(243,139,168,.08);':''}` }));
    const allPosts=this.posts.map(decorate);

    // ---- settings (live) ----
    const wallpaper = lightMode
      ? `radial-gradient(120% 110% at 12% 6%, ${hexA(accent,.30)} 0%, rgba(0,0,0,0) 50%), radial-gradient(120% 120% at 92% 96%, ${hexA(accent,.22)} 0%, rgba(0,0,0,0) 52%), linear-gradient(160deg, #f3f4f8 0%, #e6e9ef 55%, #dce0e8 100%)`
      : `radial-gradient(120% 110% at 12% 6%, ${hexA(accent,.20)} 0%, rgba(0,0,0,0) 50%), radial-gradient(120% 120% at 92% 96%, ${hexA(accent,.16)} 0%, rgba(0,0,0,0) 52%), linear-gradient(160deg, #1e1e2e 0%, #181825 55%, #11111b 100%)`;
    const togTrack=(on)=>`width:38px;height:22px;border-radius:11px;position:relative;cursor:pointer;background:${on?accent:'var(--surf0)'};transition:background .15s;`;
    const togKnob=(on)=>`position:absolute;top:2px;left:${on?18:2}px;width:18px;height:18px;border-radius:50%;background:${on?'var(--on-accent)':'var(--ov0)'};transition:left .15s;`;
    const modes=[
      {k:'light',label:'Light',prev:'linear-gradient(135deg,#eff1f5,#ccd0da)'},
      {k:'dark',label:'Dark',prev:'linear-gradient(135deg,#1e1e2e,#45475a)'},
      {k:'auto',label:'Auto',prev:'linear-gradient(135deg,#eff1f5 0%,#eff1f5 48%,#1e1e2e 52%,#1e1e2e 100%)'},
    ];
    const modeOpts=modes.map(m=>({ key:m.k, label:m.label, onClick:()=>this.setMode(m.k),
      swatchStyle:`width:84px;height:54px;border-radius:9px;background:${m.prev};margin-bottom:6px;border:2px solid ${ui.mode===m.k?accent:'var(--surf0)'};box-shadow:inset 0 0 0 1px rgba(0,0,0,.06);`,
      labelStyle:`font-size:11px;${ui.mode===m.k?'font-weight:700;color:var(--text);':'color:var(--ov0);'}` }));
    const accentPalette=['#f38ba8','#fab387','#a6e3a1','#cba6f7','#89b4fa','#f5c2e7'];
    const accentOpts=accentPalette.map(c=>({ key:c, onClick:()=>this.setAccent(c),
      style:`width:20px;height:20px;border-radius:50%;cursor:pointer;background:${c};${ui.accent===c?'box-shadow:0 0 0 2px var(--base),0 0 0 3.5px '+c+';':''}` }));
    const set={
      modeOpts, accentOpts,
      gapPct:Math.round(ui.gap/28*100)+'%', gapLabel:ui.gap+'px', startSlider:(e)=>this.startSlider(e),
      transpOn:ui.transp, roundedOn:ui.rounded, glowOn:ui.glow,
      togTranspTrack:togTrack(ui.transp), togTranspKnob:togKnob(ui.transp),
      togRoundTrack:togTrack(ui.rounded), togRoundKnob:togKnob(ui.rounded),
      togGlowTrack:togTrack(ui.glow), togGlowKnob:togKnob(ui.glow),
      toggleTransp:()=>this.toggleUi('transp'), toggleRounded:()=>this.toggleUi('rounded'), toggleGlow:()=>this.toggleUi('glow'),
    };

    return {
      booting:this.state.booting, bootLines,
      tiles, gutters, focus, close,
      chrome:`width:100%;height:100%;display:flex;flex-direction:column;background:${C.base};`,
      tbar:`flex:none;height:30px;display:flex;align-items:center;justify-content:space-between;padding:0 10px;background:${C.mantle};border-bottom:1px solid ${C.surf0};font-size:12px;cursor:default;`,
      xbtn:`width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:5px;color:${C.ov0};font-size:11px;cursor:pointer;`,
      bodyWrap:`flex:1;min-height:0;overflow:auto;`,
      wsList, focusTitle, focusDot,
      mod:{ clock:this.state.clock, cpu:this.state.cpu+'%', ram:this.state.ram+'%', vol:'64', batt:'87%' },
      showLauncher:this.state.showLauncher, showKeys:this.state.showKeys,
      toggleLauncher:()=>this.toggleLauncher(), toggleKeys:()=>this.toggleKeys(), reboot:()=>this.reboot(),
      stop:(e)=>e.stopPropagation(),
      appList, keybinds:kbWrap,
      finderPosts, finderCount, finderCats, post, readerList, photos, laps, allPosts,
      wallpaper, set, accent,
    };
  }

              {['#f38ba8','#fab387','#f9e2af','#a6e3a1','#89b4fa','#cba6f7'].map(c=>(<span key={c} style={{width:'16px',height:'16px',borderRadius:'4px',background:c}}></span>))}
            </div>
          </div>
        </div>

        <div style={{position:'absolute',right:'34px',top:'84px',zIndex:30,width:'236px',padding:'16px 18px',borderRadius:'13px',background:'color-mix(in srgb, var(--mantle) 58%, transparent)',backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)',border:'1px solid rgba(69,71,90,.5)',fontSize:'11.5px',color:'var(--sub0)',textShadow:'0 1px 6px rgba(0,0,0,.3)'}}>
          <div style={{fontSize:'26px',fontWeight:800,color:'var(--text)',letterSpacing:'-.02em',lineHeight:1}}>{v.mod.clock}<span style={{fontSize:'12px',color:'var(--ov0)',fontWeight:500}}> KST</span></div>
          <div style={{color:'var(--ov0)',marginBottom:'14px'}}>Mon 22 Jun 2026 · up 4h 12m</div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:'4px'}}><span style={{color:'#a6e3a1'}}>CPU</span><span>{v.mod.cpu}</span></div>
          <div style={{height:'5px',borderRadius:'3px',background:'var(--surf0)',marginBottom:'10px',overflow:'hidden'}}><div style={{height:'100%',width:v.mod.cpu,background:'#a6e3a1',borderRadius:'3px'}}></div></div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:'4px'}}><span style={{color:'#f9e2af'}}>RAM</span><span>{v.mod.ram} · 30/64G</span></div>
          <div style={{height:'5px',borderRadius:'3px',background:'var(--surf0)',marginBottom:'10px',overflow:'hidden'}}><div style={{height:'100%',width:v.mod.ram,background:'#f9e2af',borderRadius:'3px'}}></div></div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:'4px'}}><span style={{color:'#89b4fa'}}>DISK</span><span>61% · 1.2/2T</span></div>
          <div style={{height:'5px',borderRadius:'3px',background:'var(--surf0)',marginBottom:'13px',overflow:'hidden'}}><div style={{height:'100%',width:'61%',background:'#89b4fa',borderRadius:'3px'}}></div></div>
          <div style={{display:'flex',justifyContent:'space-between',whiteSpace:'nowrap',color:'var(--ov0)'}}><span style={{color:'#cba6f7'}}>NET</span><span>↓2.4M ↑312K</span></div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:'5px',whiteSpace:'nowrap',color:'var(--ov0)'}}><span style={{color:'#f5c2e7'}}>PROC</span><span>312 · 0.84</span></div>
        </div>

        <div style={{position:'absolute',left:'46px',bottom:'34px',zIndex:30,fontSize:'12px',color:'var(--ov0)',lineHeight:1.9,whiteSpace:'nowrap'}}>
          <div><span style={{color:'#cba6f7'}}>Super</span> + <span style={{color:'#89b4fa'}}>D</span>  앱 실행기</div>
          <div><span style={{color:'#cba6f7'}}>Super</span> + <span style={{color:'#89b4fa'}}>1-6</span>  워크스페이스</div>
          <div><span style={{color:'#cba6f7'}}>Super</span> + <span style={{color:'#89b4fa'}}>/</span>  단축키 전체보기</div>
        </div>

        {/* WAYBAR */}
        <div style={{position:'absolute',top:'8px',left:'8px',right:'8px',height:'34px',zIndex:500,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 8px',borderRadius:'11px',background:'color-mix(in srgb, var(--mantle) 86%, transparent)',backdropFilter:'blur(16px)',WebkitBackdropFilter:'blur(16px)',border:'1px solid var(--surf0)',fontSize:'12.5px'}}>
          <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
            <div data-testid="launcher" onClick={v.toggleLauncher} style={{display:'flex',alignItems:'center',gap:'6px',padding:'3px 10px',borderRadius:'7px',background:'color-mix(in srgb, var(--accent) 18%, transparent)',color:'var(--accent)',cursor:'pointer',fontWeight:700}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="5"/><path d="M4 21c0-4 3.6-6 8-6s8 2 8 6"/><circle cx="9" cy="7.5" r="0.6" fill="currentColor"/><circle cx="15" cy="7.5" r="0.6" fill="currentColor"/></svg>
              ruehanix
            </div>
            <div style={{display:'flex',alignItems:'center',gap:'3px'}}>
              {v.wsList.map(w=>(<div key={w.n} data-testid={'ws-'+w.n} onClick={w.onClick} style={S(w.style)}>{w.n}</div>))}
            </div>
          </div>
          <div style={{position:'absolute',left:'50%',transform:'translateX(-50%)',display:'flex',alignItems:'center',gap:'8px',color:'var(--sub1)'}}>
            <span style={{width:'7px',height:'7px',borderRadius:'50%',background:v.focusDot}}></span>{v.focusTitle}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:'5px'}}>
            {barChip('rgba(137,180,250,.14)','#89b4fa',<><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M5 13a10 10 0 0 1 14 0"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><circle cx="12" cy="20" r="0.5" fill="currentColor"/></svg>wlan0</>)}
            {barChip('rgba(166,227,161,.14)','#a6e3a1',<><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M9 1v3M15 1v3M9 20v3M15 20v3M1 9h3M1 15h3M20 9h3M20 15h3"/></svg>{v.mod.cpu}</>)}
            {barChip('rgba(249,226,175,.14)','#f9e2af',<><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="8" width="18" height="9" rx="1.5"/><path d="M6 8V6M10 8V6M14 8V6M18 8V6"/></svg>{v.mod.ram}</>)}
            {barChip('rgba(245,194,231,.14)','#f5c2e7',<><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M11 5L6 9H3v6h3l5 4V5z"/><path d="M16 9a4 4 0 0 1 0 6"/></svg>{v.mod.vol}</>)}
            {barChip('rgba(166,227,161,.14)','#a6e3a1',<><svg width="15" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinejoin="round"><rect x="2" y="7" width="17" height="10" rx="2"/><rect x="4" y="9" width="11" height="6" rx="1" fill="currentColor" stroke="none"/><path d="M21 10v4" strokeLinecap="round"/></svg>{v.mod.batt}</>)}
            <div style={{padding:'3px 11px',borderRadius:'7px',background:'color-mix(in srgb, var(--accent) 18%, transparent)',color:'var(--accent)',fontWeight:700}}>{v.mod.clock}</div>
            <div onClick={v.reboot} title="reboot" style={{display:'flex',alignItems:'center',padding:'3px 8px',borderRadius:'7px',background:'rgba(243,139,168,.14)',color:'#f38ba8',cursor:'pointer'}}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M12 3v9"/><path d="M6.5 7a8 8 0 1 0 11 0"/></svg></div>
          </div>
        </div>

        {/* WINDOWS */}
        <div style={{position:'absolute',inset:0,zIndex:100}}>
          {this.win(v,'files',this.bodyFiles(v))}
          {this.win(v,'reader',this.bodyReader(v))}
          {this.win(v,'foto',this.bodyFoto(v))}
          {this.win(v,'hotlap',this.bodyHotlap(v))}
          {this.win(v,'terminal',this.bodyTerminal(v))}
          {this.win(v,'web',this.bodyWeb(v))}
          {this.win(v,'settings',this.bodySettings(v))}
          {this.win(v,'about',this.bodyAbout(v))}
          {v.gutters.map((g,i)=>(<div key={i} onMouseDown={g.onDown} style={S(g.style)}></div>))}
        </div>

        {/* LAUNCHER */}
        {v.showLauncher && (
          <div onClick={v.toggleLauncher} style={{position:'absolute',inset:0,zIndex:9000,background:'rgba(17,17,27,.55)',backdropFilter:'blur(3px)',display:'flex',alignItems:'flex-start',justifyContent:'center',paddingTop:'118px'}}>
            <div onClick={v.stop} style={{width:'420px',background:'color-mix(in srgb, var(--mantle) 97%, transparent)',border:'1px solid var(--surf1)',borderRadius:'14px',overflow:'hidden',boxShadow:'0 30px 80px rgba(0,0,0,.55)',animation:'rh-fadeup .16s ease'}}>
              <div style={{display:'flex',alignItems:'center',gap:'9px',padding:'13px 16px',borderBottom:'1px solid var(--surf0)',color:'var(--ov0)'}}>
                <span style={{color:'var(--accent)'}}>❯</span><span style={{color:'var(--text)'}}>앱 검색…</span><span style={{width:'7px',height:'15px',background:'#cba6f7',animation:'rh-blink 1.1s steps(1) infinite'}}></span>
              </div>
              <div style={{padding:'8px',maxHeight:'340px',overflow:'auto'}}>
                {v.appList.map(a=>(
                  <div key={a.name} className="rh-launch-item" onClick={a.onClick} style={{display:'flex',alignItems:'center',gap:'12px',padding:'10px 12px',borderRadius:'9px',cursor:'pointer'}}>
                    <span style={{color:a.color,display:'flex'}}>{a.icon}</span>
                    <span style={{fontSize:'13.5px',color:'var(--text)',flex:1}}>{a.name}</span>
                    <span style={{fontSize:'11px',color:'var(--ov0)'}}>{a.hint}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* KEYBIND OVERLAY */}
        {v.showKeys && (
          <div onClick={v.toggleKeys} style={{position:'absolute',inset:0,zIndex:9100,background:'rgba(17,17,27,.62)',backdropFilter:'blur(4px)',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <div onClick={v.stop} style={{width:'560px',background:'color-mix(in srgb, var(--mantle) 98%, transparent)',border:'1px solid var(--surf1)',borderRadius:'16px',padding:'26px 30px',boxShadow:'0 30px 80px rgba(0,0,0,.55)',animation:'rh-fadeup .16s ease'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'20px'}}>
                <span style={{fontSize:'16px',fontWeight:700,color:'var(--accent)'}}>키보드 단축키</span>
                <span style={{fontSize:'12px',color:'var(--ov0)'}}>Hyprland 스타일 · Super = ⊞</span>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'9px 26px'}}>{v.keybinds}</div>
            </div>
          </div>
        )}

        {/* BOOT */}
        {v.booting && (
          <div style={{position:'absolute',inset:0,zIndex:9900,background:'var(--crust)',padding:'34px 40px',fontSize:'13px',lineHeight:1.7,color:'var(--sub0)',overflow:'hidden'}}>
            {v.bootLines.map((l,i)=>(<div key={i}>{l.node}</div>))}
            <div style={{marginTop:'6px',display:'flex',alignItems:'center',gap:'8px',color:'var(--text)'}}>
              <span style={{color:'#a6e3a1'}}>ruehan@ruehanix</span><span style={{color:'#89b4fa'}}>~</span><span>login:</span><span style={{width:'8px',height:'15px',background:'var(--text)',animation:'rh-blink 1.1s steps(1) infinite'}}></span>
            </div>
          </div>
        )}

      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
